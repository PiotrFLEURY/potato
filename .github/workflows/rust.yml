name: Build Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      
      - uses: actions/checkout@v6

      - name: Build
        working-directory: ./potato_server
        run: cargo build --verbose

      - name: Run tests
        working-directory: ./potato_server
        run: cargo test --verbose